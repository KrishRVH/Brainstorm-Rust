name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Read release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mise trust
          mise run check-version

          version="$(mise run version)"
          expected_tag="v${version}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match repository version ${expected_tag}"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; releases are immutable"
            exit 1
          fi
          {
            echo "RELEASE_VERSION=$version"
            echo "RELEASE_TITLE=Brainstorm Supercharged v$version"
            echo "PACKAGE_ZIP=Brainstorm_Supercharged_v$version.zip"
          } >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-mingw-w64-x86-64 \
            file \
            gcc-mingw-w64-x86-64 \
            luajit \
            luarocks \
            rsync \
            wine \
            zip

      - name: Install project tools
        run: |
          cargo install stylua --version 2.3.1 --locked
          mise run setup-lua

      - name: Package release zip
        run: mise run release

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp "release/${PACKAGE_ZIP}" release-artifacts/
          (cd release-artifacts && sha256sum "${PACKAGE_ZIP}" > SHA256SUMS.txt)

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="$(cat <<'EOF'
          Brainstorm Supercharged production release.

          Credits: Full rewrite by KRVH.
          Originals: Brainstorm by OceanRamen; Immolate by MathIsFun0.

          Install:
          1. Download and unzip the release file that contains `Immolate.dll`.
          2. Place all unzipped contents in `.../%appdata%/balatro/mods`.
          3. Make sure the mod's directory name is exactly `Brainstorm`.
          4. Reload the game to activate the mod.
          EOF
          )"

          gh release create "${RELEASE_TAG}" release-artifacts/* \
            --verify-tag \
            --title "${RELEASE_TITLE}" \
            --notes "${notes}" \
            --latest
