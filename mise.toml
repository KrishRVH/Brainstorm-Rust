[env]
IMMO_DIR = "Immolate"
DLL = "Immolate.dll"
TARGET_DIR = "target"

[tasks.default]
description = "List available Brainstorm tasks"
run = "mise tasks ls"

[tasks.setup]
description = "Check required tools and install local Lua lint tools"
shell = "bash -c"
run = '''
set -euo pipefail
rustup target add "${RUST_TARGET:-x86_64-pc-windows-gnu}"
mise run setup-lua
mise run doctor
'''

[tasks.setup-lua]
description = "Install local Lua lint tools through LuaRocks"
shell = "bash -c"
run = '''
set -euo pipefail
if ! command -v luajit >/dev/null; then
  echo "luajit not found. Install LuaJIT with your OS package manager."
  exit 1
fi
if ! command -v luarocks >/dev/null; then
  echo "luarocks not found. Install LuaRocks with your OS package manager."
  exit 1
fi

export PATH="$HOME/.luarocks/bin:$PATH"
if ! command -v luacheck >/dev/null; then
  luarocks --local install luacheck
fi
luacheck --version
'''

[tasks.doctor]
description = "Check required system and local development tools"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
missing=0
check_cmd() {
  if ! command -v "$1" >/dev/null; then
    echo "missing: $1"
    missing=1
  else
    echo "ok: $1"
  fi
}

check_cmd rustup
check_cmd cargo
check_cmd stylua
check_cmd luajit
check_cmd luarocks
check_cmd luacheck
check_cmd x86_64-w64-mingw32-gcc
check_cmd x86_64-w64-mingw32-objdump
check_cmd wine
check_cmd file
check_cmd zip
check_cmd rsync

rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "missing Rust target: $rust_target"
  missing=1
else
  echo "ok: Rust target $rust_target"
fi

exit "$missing"
'''

[tasks.version]
description = "Print the canonical mod version"
shell = "bash -c"
run = '''
set -euo pipefail
sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1
'''

[tasks.check-version]
description = "Verify release/package version metadata is in sync"
shell = "bash -c"
run = '''
set -euo pipefail
version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
compat_version="$(sed -n 's/^--- VERSION:[[:space:]]*//p' steamodded_compat.lua | head -n1)"

[ -n "$version_number" ] || {
  echo "lovely.toml manifest version is missing"
  exit 1
}
[ "$compat_version" = "$version_number" ] || {
  echo "steamodded_compat.lua VERSION is $compat_version but lovely.toml is $version_number"
  exit 1
}

echo "version ok: $version_number"
'''

[tasks.bump-version]
description = "Update lovely.toml and Steamodded metadata together. Usage: VERSION=3.2 mise run bump-version"
shell = "bash -c"
run = '''
set -euo pipefail
new_version="${VERSION:-}"
if [ -z "$new_version" ]; then
  echo "Set VERSION, for example: VERSION=3.2 mise run bump-version"
  exit 1
fi
case "$new_version" in
  *[!0-9A-Za-z.+_-]*|'')
    echo "Invalid VERSION: $new_version"
    exit 1
    ;;
esac

sed -i -E "0,/^version = \".*\"/s//version = \"$new_version\"/" lovely.toml
sed -i -E "s/^(--- VERSION:[[:space:]]*).*/\\1$new_version/" steamodded_compat.lua
mise run check-version
'''

[tasks.build]
description = "Build the Rust Immolate.dll artifact"
run = "mise run build-rust"

[tasks.build-rust]
description = "Build the Rust DLL and copy it to target/rust"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
rust_dll="$IMMO_DIR/target/$rust_target/release/immolate.dll"
rust_artifact_dir="$TARGET_DIR/rust"

echo "Building Rust $DLL"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build --manifest-path "$IMMO_DIR/Cargo.toml" --release --target "$rust_target"
mkdir -p "$rust_artifact_dir"
cp "$rust_dll" "$rust_artifact_dir/$DLL"
'''

[tasks.build-harness]
description = "Build the Windows DLL harness"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
echo "Building Rust DLL harness"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build \
  --manifest-path "$IMMO_DIR/Cargo.toml" \
  --release \
  --target "$rust_target" \
  --bin immolate_dll_harness
'''

[tasks.fmt-rust-check]
description = "Check Rust formatting"
run = "cargo fmt --manifest-path \"$IMMO_DIR/Cargo.toml\" --check"

[tasks.format-rust-check]
description = "Alias for fmt-rust-check"
run = "mise run fmt-rust-check"

[tasks.clippy-rust]
description = "Run Rust clippy with warnings denied"
run = "cargo clippy --manifest-path \"$IMMO_DIR/Cargo.toml\" --all-targets -- -D warnings"

[tasks.test-rust]
description = "Run Rust unit tests"
run = "cargo test --manifest-path \"$IMMO_DIR/Cargo.toml\""

[tasks.check-rust-dll]
description = "Validate Rust DLL exports and runtime imports"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust

rust_artifact="$TARGET_DIR/rust/$DLL"
file "$rust_artifact" | grep -Eq 'PE32\+.*x86-64' || {
  file "$rust_artifact"
  exit 1
}

exports="$(
  x86_64-w64-mingw32-objdump -p "$rust_artifact" |
    sed -n '/^\[Ordinal\/Name Pointer\] Table$/,/^$/p' |
    awk '/\[[[:space:]]*[0-9]+\]/{print $NF}'
)"
expected="$(printf '%s\n' brainstorm_search free_result immolate_last_error immolate_set_log_path | sort)"
actual="$(printf '%s\n' "$exports" | sort)"
if [ "$actual" != "$expected" ]; then
  echo "unexpected Rust DLL exports:"
  printf '%s\n' "$exports"
  exit 1
fi

for bad in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
  if x86_64-w64-mingw32-objdump -p "$rust_artifact" | grep -qi "DLL Name: $bad"; then
    echo "Rust DLL has unshipped runtime import: $bad"
    exit 1
  fi
done
'''

[tasks.bench]
description = "Benchmark the Rust DLL under Wine"
run = "mise run bench-rust"

[tasks.bench-rust]
description = "Benchmark the Rust DLL under Wine"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$IMMO_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-1}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"
wine "$harness" bench \
  --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-compare]
description = "Benchmark Rust against the Original Brainstorm DLL"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
original_dll="${BENCH_ORIGINAL_DLL:-${ORIGINAL_DLL:-$IMMO_DIR/Immolate-OceanRamenandMathIsFun0.dll}}"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$IMMO_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-1}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_min_ratio="${BENCH_MIN_RATIO:-0.0}"
bench_fail_on_mismatch="${BENCH_FAIL_ON_MISMATCH:-0}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"

if [ ! -f "$original_dll" ]; then
  echo "original DLL not found: $original_dll"
  exit 1
fi

wine "$harness" bench-compare \
  --rust "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --original "$(winepath -w "$(readlink -f "$original_dll")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --min-ratio "$bench_min_ratio" \
  --fail-on-mismatch "$bench_fail_on_mismatch" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-original]
description = "Alias for bench-compare"
run = "mise run bench-compare"

[tasks.bench-full]
description = "Full-suite Rust vs Original benchmark report"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=1 \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=0.0 \
mise run bench-compare
'''

[tasks.bench-ux]
description = "Actual Lua UI UX benchmark report"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=ux \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=0.0 \
mise run bench-compare
'''

[tasks.bench-pretty]
description = "Full-suite pretty benchmark dashboard"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=1000000 \
BENCH_REPEAT=7 \
BENCH_WARMUP=2 \
BENCH_THREADS=1 \
BENCH_FORMAT=pretty \
BENCH_COLOR=always \
BENCH_MIN_RATIO=0.0 \
mise run bench-compare
'''

[tasks.check-rust]
description = "Run Rust format, clippy, tests, DLL validation, and benchmark smoke"
shell = "bash -c"
run = '''
set -euo pipefail
mise run fmt-rust-check
mise run clippy-rust
mise run test-rust
mise run check-rust-dll
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$IMMO_DIR/target/$rust_target/release/immolate_dll_harness.exe"

smoke_bench() {
  bench_case="$1"
  bench_budget="$2"

  echo "Benchmarking Rust $DLL smoke: $bench_case"
  wine "$harness" bench \
    --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
    --case "$bench_case" \
    --budget "$bench_budget" \
    --threads "${BENCH_THREADS:-1}" \
    --repeat 1 \
    --warmup "${BENCH_WARMUP:-1}" \
    --format "${BENCH_FORMAT:-pretty}" \
    --color "${BENCH_COLOR:-auto}"
}

smoke_bench tag-hit 1000
smoke_bench ux-tag-soul-pack 20000
'''

[tasks.check]
description = "Run Lua lint plus the Rust DLL validation gate"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint-lua
mise run check-rust
'''

[tasks.format]
description = "Format Lua and Rust"
shell = "bash -c"
run = '''
set -euo pipefail
lua_files=(Brainstorm.lua UI.lua steamodded_compat.lua)
stylua "${lua_files[@]}"
cargo fmt --manifest-path "$IMMO_DIR/Cargo.toml"
'''

[tasks.fmt]
description = "Alias for format"
run = "mise run format"

[tasks.lint-lua]
description = "Check Lua formatting, bytecode syntax, luacheck, and version metadata"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
lua_files=(Brainstorm.lua UI.lua steamodded_compat.lua)
syntax_lua_files=("${lua_files[@]}" nativefs.lua)

command -v stylua >/dev/null || { echo "stylua not found. Install Stylua, then run: mise run doctor"; exit 1; }
command -v luajit >/dev/null || { echo "luajit not found. Install LuaJIT, then run: mise run doctor"; exit 1; }
command -v luacheck >/dev/null || { echo "luacheck not found. Run: mise run setup-lua"; exit 1; }

stylua --check "${lua_files[@]}"
for lua_file in "${syntax_lua_files[@]}"; do
  luajit -b "$lua_file" "/tmp/brainstorm-${lua_file//\//-}.luajit"
done
luacheck "${lua_files[@]}"
mise run check-version
'''

[tasks.lint-rust]
description = "Check Rust formatting and clippy"
shell = "bash -c"
run = '''
set -euo pipefail
cargo fmt --manifest-path "$IMMO_DIR/Cargo.toml" --check
cargo clippy --manifest-path "$IMMO_DIR/Cargo.toml" --all-targets -- -D warnings
'''

[tasks.lint]
description = "Check Lua and Rust formatting/lints"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint-lua
mise run lint-rust
'''

[tasks.stage-payload]
description = "Stage the Brainstorm install payload under target/package/Brainstorm"
shell = "bash -c"
run = '''
set -euo pipefail
version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
stage_root="$TARGET_DIR/package"
stage_dir="$stage_root/Brainstorm"
rust_artifact="$TARGET_DIR/rust/$DLL"

[ -n "$version_number" ] || {
  echo "lovely.toml manifest version is missing"
  exit 1
}
[ -f "$rust_artifact" ] || mise run build-rust

rm -rf "$stage_root"
mkdir -p "$stage_dir"
cp Brainstorm.lua UI.lua lovely.toml nativefs.lua steamodded_compat.lua LICENSE NOTICE.md "$stage_dir"/
cp "$rust_artifact" "$stage_dir/$DLL"
sed -i -E '0,/^dump_lua = .*/s//dump_lua = false/' "$stage_dir/lovely.toml"
{
  echo "$version_number"
  date
} > "$stage_dir/VERSION"
'''

[tasks.release]
description = "Build, validate, and package release zip"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check
mise run stage-payload

version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
package_dir="Brainstorm"
package_zip="Brainstorm_v$version_number.zip"
stage_dir="$TARGET_DIR/package/$package_dir"
release_dir="release/$package_dir"

rm -rf release
mkdir -p release
cp -a "$stage_dir" "$release_dir"
zip_path="release/$package_zip"
command -v zip >/dev/null || { echo "zip not found"; exit 1; }
(cd release && zip -r "$package_zip" "$package_dir" >/dev/null)
test -s "$zip_path"
echo "created $zip_path"
'''

[tasks.deploy]
description = "Build, validate, and copy the mod to TARGET"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check
mise run stage-payload

resolve_target() {
  if [ -n "${TARGET:-}" ]; then
    printf '%s\n' "$TARGET"
    return
  fi
  if command -v powershell.exe >/dev/null && command -v wslpath >/dev/null; then
    appdata="$(powershell.exe -NoProfile -Command '[Environment]::GetFolderPath("ApplicationData")' | tr -d '\r' | tail -n1)"
    if [ -n "$appdata" ]; then
      wslpath "$appdata/Balatro/Mods/Brainstorm"
      return
    fi
  fi
  echo "Set TARGET to your Balatro Mods/Brainstorm directory." >&2
  exit 1
}

target="$(resolve_target)"
stage_dir="$TARGET_DIR/package/Brainstorm"

if [ "$(basename "$target")" != "Brainstorm" ]; then
  echo "TARGET must end with /Brainstorm: $target"
  exit 1
fi

echo "Deploying to $target"
mkdir -p "$target"
rsync -a --delete --exclude config.lua "$stage_dir"/ "$target"/
'''

[tasks.clean]
description = "Remove build and release artifacts"
run = "rm -rf Immolate/target release target"
