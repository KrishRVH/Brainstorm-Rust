[tools]
rust = "1.96.0"
stylua = "2.3.1"

[env]
IMMO_DIR = "Immolate"
RUST_DIR = "Immolate/Rust"
DLL = "Immolate.dll"
RELEASE_DIR = "release/Brainstorm_v3.1"
TARGET_DIR = "target"

[tasks.default]
description = "List available Brainstorm tasks"
run = "mise tasks ls"

[tasks.setup]
description = "Install mise-managed tools and local Lua lint tools"
shell = "bash -c"
run = '''
set -euo pipefail
mise install
rustup target add "${RUST_TARGET:-x86_64-pc-windows-gnu}"
mise run setup-lua
mise run doctor
'''

[tasks.setup-lua]
description = "Install local Lua lint tools through LuaRocks"
shell = "bash -c"
run = '''
set -euo pipefail
if ! command -v luajit >/dev/null; then
  echo "luajit not found. Install LuaJIT with your OS package manager."
  exit 1
fi
if ! command -v luarocks >/dev/null; then
  echo "luarocks not found. Install LuaRocks with your OS package manager."
  exit 1
fi

export PATH="$HOME/.luarocks/bin:$PATH"
if ! command -v luacheck >/dev/null; then
  luarocks --local install luacheck
fi
luacheck --version
'''

[tasks.doctor]
description = "Check required system and mise-managed development tools"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
missing=0
check_cmd() {
  if ! command -v "$1" >/dev/null; then
    echo "missing: $1"
    missing=1
  else
    echo "ok: $1"
  fi
}

check_cmd rustup
check_cmd cargo
check_cmd stylua
check_cmd luajit
check_cmd luarocks
check_cmd luacheck
check_cmd x86_64-w64-mingw32-gcc
check_cmd x86_64-w64-mingw32-objdump
check_cmd wine
check_cmd nvcc
check_cmd file
check_cmd zip

rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "missing Rust target: $rust_target"
  missing=1
else
  echo "ok: Rust target $rust_target"
fi

exit "$missing"
'''

[tasks.build]
description = "Build the default Rust Immolate.dll"
run = "mise run build-rust"

[tasks.build-rust]
description = "Build the Rust DLL and copy it to target/rust and repo root"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
rust_dll="$RUST_DIR/target/$rust_target/release/immolate.dll"
rust_artifact_dir="$TARGET_DIR/rust"

echo "Building Rust $DLL"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build --manifest-path "$RUST_DIR/Cargo.toml" --release --target "$rust_target"
mkdir -p "$rust_artifact_dir"
cp "$rust_dll" "$rust_artifact_dir/$DLL"
cp "$rust_dll" "$DLL"
'''

[tasks.build-harness]
description = "Build the Windows DLL harness"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
echo "Building Rust DLL harness"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build \
  --manifest-path "$RUST_DIR/Cargo.toml" \
  --release \
  --target "$rust_target" \
  --bin immolate_dll_harness
'''

[tasks.fmt-rust-check]
description = "Check Rust formatting"
run = "cargo fmt --manifest-path \"$RUST_DIR/Cargo.toml\" --check"

[tasks.format-rust-check]
description = "Alias for fmt-rust-check"
run = "mise run fmt-rust-check"

[tasks.clippy-rust]
description = "Run Rust clippy with warnings denied"
run = "cargo clippy --manifest-path \"$RUST_DIR/Cargo.toml\" --all-targets -- -D warnings"

[tasks.test-rust]
description = "Run Rust unit tests"
run = "cargo test --manifest-path \"$RUST_DIR/Cargo.toml\""

[tasks.check-rust-dll]
description = "Validate Rust DLL exports and runtime imports"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust

rust_artifact="$TARGET_DIR/rust/$DLL"
file "$rust_artifact" | grep -Eq 'PE32\+.*x86-64' || {
  file "$rust_artifact"
  exit 1
}

exports="$(
  x86_64-w64-mingw32-objdump -p "$rust_artifact" |
    sed -n '/^\[Ordinal\/Name Pointer\] Table/,/^$/p' |
    awk '/\[[[:space:]]*[0-9]+\]/{print $NF}'
)"
expected="$(printf '%s\n' brainstorm_search free_result immolate_last_error immolate_set_cuda_enabled immolate_set_log_path | sort)"
actual="$(printf '%s\n' "$exports" | sort)"
if [ "$actual" != "$expected" ]; then
  echo "unexpected Rust DLL exports:"
  printf '%s\n' "$exports"
  exit 1
fi

for bad in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
  if x86_64-w64-mingw32-objdump -p "$rust_artifact" | grep -qi "DLL Name: $bad"; then
    echo "Rust DLL has unshipped runtime import: $bad"
    exit 1
  fi
done
'''

[tasks.compare]
description = "Alias for bench-compare"
run = "mise run bench-compare"

[tasks.bench]
description = "Benchmark the Rust DLL under Wine"
run = "mise run bench-rust"

[tasks.bench-rust]
description = "Benchmark the Rust DLL under Wine"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-0}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_cuda="${BENCH_CUDA:-default}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"
wine "$harness" bench \
  --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --cuda "$bench_cuda" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-compare]
description = "Benchmark Rust CPU/CUDA against the legacy Original Brainstorm DLL"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
original_dll="${BENCH_ORIGINAL_DLL:-${ORIGINAL_DLL:-$IMMO_DIR/Immolate-OceanRamenandMathIsFun0.dll}}"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-0}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_cuda="${BENCH_CUDA:-both}"
bench_min_ratio="${BENCH_MIN_RATIO:-1.0}"
bench_fail_on_mismatch="${BENCH_FAIL_ON_MISMATCH:-0}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"

if [ ! -f "$original_dll" ]; then
  echo "legacy Original DLL not found: $original_dll"
  exit 1
fi

wine "$harness" bench-compare \
  --rust "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --original "$(winepath -w "$(readlink -f "$original_dll")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --cuda "$bench_cuda" \
  --min-ratio "$bench_min_ratio" \
  --fail-on-mismatch "$bench_fail_on_mismatch" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-compare-windows]
description = "Benchmark Rust CPU/CUDA against the legacy Original DLL as a native Windows process"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

powershell="${POWERSHELL_EXE:-powershell.exe}"
if ! command -v "$powershell" >/dev/null; then
  powershell="/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe"
fi
if ! command -v "$powershell" >/dev/null; then
  echo "powershell.exe not found. Run this task from WSL with Windows interop enabled."
  exit 1
fi

rust_artifact="$TARGET_DIR/rust/$DLL"
original_dll="${BENCH_ORIGINAL_DLL:-${ORIGINAL_DLL:-$IMMO_DIR/Immolate-OceanRamenandMathIsFun0.dll}}"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-0}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_cuda="${BENCH_CUDA:-both}"
bench_min_ratio="${BENCH_MIN_RATIO:-1.0}"
bench_fail_on_mismatch="${BENCH_FAIL_ON_MISMATCH:-0}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"

if [ ! -f "$original_dll" ]; then
  echo "legacy Original DLL not found: $original_dll"
  exit 1
fi

export BS_HARNESS_WIN
export BS_RUST_DLL_WIN
export BS_ORIGINAL_DLL_WIN
export BS_CASE="$bench_case"
export BS_BUDGET="$bench_budget"
export BS_THREADS="$bench_threads"
export BS_REPEAT="$bench_repeat"
export BS_WARMUP="$bench_warmup"
export BS_CUDA="$bench_cuda"
export BS_MIN_RATIO="$bench_min_ratio"
export BS_FAIL_ON_MISMATCH="$bench_fail_on_mismatch"
export BS_FORMAT="$bench_format"
export BS_COLOR="$bench_color"

BS_HARNESS_WIN="$(wslpath -w "$(readlink -f "$harness")")"
BS_RUST_DLL_WIN="$(wslpath -w "$(readlink -f "$rust_artifact")")"
BS_ORIGINAL_DLL_WIN="$(wslpath -w "$(readlink -f "$original_dll")")"
export WSLENV="${WSLENV:+$WSLENV:}BS_HARNESS_WIN/w:BS_RUST_DLL_WIN/w:BS_ORIGINAL_DLL_WIN/w:BS_CASE/w:BS_BUDGET/w:BS_THREADS/w:BS_REPEAT/w:BS_WARMUP/w:BS_CUDA/w:BS_MIN_RATIO/w:BS_FAIL_ON_MISMATCH/w:BS_FORMAT/w:BS_COLOR/w"

"$powershell" -NoProfile -ExecutionPolicy Bypass -Command '
& $env:BS_HARNESS_WIN bench-compare `
  --rust $env:BS_RUST_DLL_WIN `
  --original $env:BS_ORIGINAL_DLL_WIN `
  --case $env:BS_CASE `
  --budget $env:BS_BUDGET `
  --threads $env:BS_THREADS `
  --repeat $env:BS_REPEAT `
  --warmup $env:BS_WARMUP `
  --cuda $env:BS_CUDA `
  --min-ratio $env:BS_MIN_RATIO `
  --fail-on-mismatch $env:BS_FAIL_ON_MISMATCH `
  --format $env:BS_FORMAT `
  --color $env:BS_COLOR
'
'''

[tasks.bench-cuda-long-windows]
description = "Native Windows long CUDA benchmark from WSL"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE="${BENCH_CASE:-cuda-long}" \
BENCH_BUDGET="${BENCH_BUDGET:-25000000}" \
BENCH_REPEAT="${BENCH_REPEAT:-3}" \
BENCH_WARMUP="${BENCH_WARMUP:-1}" \
BENCH_THREADS="${BENCH_THREADS:-0}" \
BENCH_CUDA="${BENCH_CUDA:-both}" \
BENCH_FORMAT="${BENCH_FORMAT:-pretty}" \
BENCH_COLOR="${BENCH_COLOR:-never}" \
BENCH_MIN_RATIO="${BENCH_MIN_RATIO:-0.0}" \
BENCH_FAIL_ON_MISMATCH="${BENCH_FAIL_ON_MISMATCH:-0}" \
mise run bench-compare-windows
'''

[tasks.bench-full]
description = "Full-suite Rust CPU/CUDA vs legacy Original benchmark report"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_CUDA=both \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.bench-ux]
description = "Strict DLL UX benchmark gate"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=ux \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_CUDA=both \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.bench-pretty]
description = "Full-suite pretty benchmark dashboard"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=1000000 \
BENCH_REPEAT=7 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_CUDA=both \
BENCH_FORMAT=pretty \
BENCH_COLOR=always \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.check-rust]
description = "Run Rust format, clippy, tests, DLL validation, and benchmark smoke"
shell = "bash -c"
run = '''
set -euo pipefail
mise run fmt-rust-check
mise run clippy-rust
mise run test-rust
mise run check-rust-dll
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"

smoke_bench() {
  bench_case="$1"
  bench_budget="$2"

  echo "Benchmarking Rust $DLL smoke: $bench_case"
  wine "$harness" bench \
    --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
    --case "$bench_case" \
    --budget "$bench_budget" \
    --threads "${BENCH_THREADS:-0}" \
    --repeat 1 \
    --warmup "${BENCH_WARMUP:-1}" \
    --cuda both \
    --format "${BENCH_FORMAT:-pretty}" \
    --color "${BENCH_COLOR:-auto}"
}

smoke_bench tag-hit 1000
smoke_bench ux-tag-soul-pack 20000
'''

[tasks.check]
description = "Run Lua/Rust lint plus the Rust DLL validation gate"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint
mise run check-rust
'''

[tasks.format]
description = "Format Lua and Rust where tools are available"
shell = "bash -c"
run = '''
set -euo pipefail
if command -v stylua >/dev/null; then
  stylua Brainstorm.lua UI.lua config.lua steamodded_compat.lua
else
  echo "stylua not found"
fi

cargo fmt --manifest-path "$RUST_DIR/Cargo.toml"
'''

[tasks.fmt]
description = "Alias for format"
run = "mise run format"

[tasks.lint]
description = "Check Lua and Rust formatting/lints"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
lua_files=(Brainstorm.lua UI.lua config.lua steamodded_compat.lua nativefs.lua)

command -v stylua >/dev/null || { echo "stylua not found. Run: mise install"; exit 1; }
command -v luajit >/dev/null || { echo "luajit not found. Install LuaJIT, then run: mise run doctor"; exit 1; }
command -v luacheck >/dev/null || { echo "luacheck not found. Run: mise run setup-lua"; exit 1; }

stylua --check Brainstorm.lua UI.lua config.lua steamodded_compat.lua
for lua_file in "${lua_files[@]}"; do
  luajit -b "$lua_file" "/tmp/brainstorm-${lua_file//\//-}.luajit"
done
luacheck Brainstorm.lua UI.lua config.lua steamodded_compat.lua

cargo fmt --manifest-path "$RUST_DIR/Cargo.toml" --check
cargo clippy --manifest-path "$RUST_DIR/Cargo.toml" --all-targets -- -D warnings
'''

[tasks.release]
description = "Build, validate, and package release zip"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check

rm -rf release
mkdir -p "$RELEASE_DIR"
cp Brainstorm.lua UI.lua config.lua lovely.toml nativefs.lua steamodded_compat.lua "$RELEASE_DIR"/
cp "$DLL" "$RELEASE_DIR"/
echo "3.1" > "$RELEASE_DIR/VERSION"
date >> "$RELEASE_DIR/VERSION"
if command -v zip >/dev/null; then
  (cd release && zip -r Brainstorm_v3.1.zip Brainstorm_v3.1 >/dev/null)
else
  echo "zip not found"
fi
'''

[tasks.deploy]
description = "Build, validate, and copy the mod to TARGET"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check-rust
target="${TARGET:-/mnt/c/Users/Krish/AppData/Roaming/Balatro/Mods/Brainstorm}"

echo "Deploying to $target"
mkdir -p "$target"
rm -rf "$target/Core" "$target/UI"
cp Brainstorm.lua UI.lua config.lua lovely.toml nativefs.lua steamodded_compat.lua "$target"/
cp "$DLL" "$target/$DLL"
'''

[tasks.clean]
description = "Remove build and release artifacts"
run = "rm -rf Immolate/build Immolate.dll release target/rust"
