[tools]
rust = "1.96.0"
stylua = "2.3.1"

[env]
IMMO_DIR = "Immolate"
CPP_DIR = "Immolate/CPP"
RUST_DIR = "Immolate/Rust"
DLL = "Immolate.dll"
RELEASE_DIR = "release/Brainstorm_v3.1"
TARGET_DIR = "target"

[tasks.default]
description = "List available Brainstorm tasks"
run = "mise tasks ls"

[tasks.setup]
description = "Install mise-managed tools and local Lua lint tools"
shell = "bash -c"
run = '''
set -euo pipefail
mise install
rustup target add "${RUST_TARGET:-x86_64-pc-windows-gnu}"
mise run setup-lua
mise run doctor
'''

[tasks.setup-lua]
description = "Install local Lua lint tools through LuaRocks"
shell = "bash -c"
run = '''
set -euo pipefail
if ! command -v luajit >/dev/null; then
  echo "luajit not found. Install LuaJIT with your OS package manager."
  exit 1
fi
if ! command -v luarocks >/dev/null; then
  echo "luarocks not found. Install LuaRocks with your OS package manager."
  exit 1
fi

export PATH="$HOME/.luarocks/bin:$PATH"
if ! command -v luacheck >/dev/null; then
  luarocks --local install luacheck
fi
luacheck --version
'''

[tasks.doctor]
description = "Check required system and mise-managed development tools"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
missing=0
check_cmd() {
  if ! command -v "$1" >/dev/null; then
    echo "missing: $1"
    missing=1
  else
    echo "ok: $1"
  fi
}

check_cmd rustup
check_cmd cargo
check_cmd stylua
check_cmd luajit
check_cmd luarocks
check_cmd luacheck
check_cmd clang-format
check_cmd x86_64-w64-mingw32-g++
check_cmd x86_64-w64-mingw32-objdump
check_cmd wine
check_cmd nvcc
check_cmd file
check_cmd zip

rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "missing Rust target: $rust_target"
  missing=1
else
  echo "ok: Rust target $rust_target"
fi

exit "$missing"
'''

[tasks.build]
description = "Build the default Rust Immolate.dll"
run = "mise run build-rust"

[tasks.build-cpp]
description = "Build the C++ oracle DLL"
shell = "bash -c"
run = '''
set -euo pipefail
cpp_dll="$TARGET_DIR/cpp/$DLL"
sources=(
  "$CPP_DIR/brainstorm.cpp"
  "$CPP_DIR/functions.cpp"
  "$CPP_DIR/rng.cpp"
  "$CPP_DIR/seed.cpp"
  "$CPP_DIR/util.cpp"
)

echo "Building $DLL"
if ! command -v x86_64-w64-mingw32-g++ >/dev/null; then
  echo "x86_64-w64-mingw32-g++ not found. Install mingw-w64."
  exit 1
fi

mkdir -p "$TARGET_DIR/cpp"
x86_64-w64-mingw32-g++ \
  -shared \
  -O3 \
  -std=c++17 \
  -DBUILDING_DLL \
  -o "$cpp_dll" \
  "${sources[@]}" \
  -I "$CPP_DIR" \
  -static-libgcc \
  -static-libstdc++ \
  -Wl,--export-all-symbols
cp "$cpp_dll" "$DLL"
'''

[tasks.build-rust]
description = "Build the Rust DLL and copy it to target/rust and repo root"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
rust_dll="$RUST_DIR/target/$rust_target/release/immolate.dll"
rust_artifact_dir="$TARGET_DIR/rust"

echo "Building Rust $DLL"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build --manifest-path "$RUST_DIR/Cargo.toml" --release --target "$rust_target"
mkdir -p "$rust_artifact_dir"
cp "$rust_dll" "$rust_artifact_dir/$DLL"
cp "$rust_dll" "$DLL"
'''

[tasks.build-harness]
description = "Build the Windows DLL harness"
shell = "bash -c"
run = '''
set -euo pipefail
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
echo "Building Rust DLL harness"
if ! rustup target list --installed | grep -qx "$rust_target"; then
  echo "Rust target $rust_target not installed. Run: rustup target add $rust_target"
  exit 1
fi

cargo build \
  --manifest-path "$RUST_DIR/Cargo.toml" \
  --release \
  --target "$rust_target" \
  --bin immolate_dll_harness
'''

[tasks.fmt-rust-check]
description = "Check Rust formatting"
run = "cargo fmt --manifest-path \"$RUST_DIR/Cargo.toml\" --check"

[tasks.format-rust-check]
description = "Alias for fmt-rust-check"
run = "mise run fmt-rust-check"

[tasks.clippy-rust]
description = "Run Rust clippy with warnings denied"
run = "cargo clippy --manifest-path \"$RUST_DIR/Cargo.toml\" --all-targets -- -D warnings"

[tasks.test-rust]
description = "Run Rust unit tests"
run = "cargo test --manifest-path \"$RUST_DIR/Cargo.toml\""

[tasks.check-rust-dll]
description = "Validate Rust DLL exports and runtime imports"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust

rust_artifact="$TARGET_DIR/rust/$DLL"
file "$rust_artifact" | grep -Eq 'PE32\+.*x86-64' || {
  file "$rust_artifact"
  exit 1
}

exports="$(
  x86_64-w64-mingw32-objdump -p "$rust_artifact" |
    sed -n '/^\[Ordinal\/Name Pointer\] Table$/,/^$/p' |
    awk '/\[[[:space:]]*[0-9]+\]/{print $NF}'
)"
expected="$(printf '%s\n' brainstorm_search free_result immolate_last_error immolate_set_cuda_enabled immolate_set_log_path | sort)"
actual="$(printf '%s\n' "$exports" | sort)"
if [ "$actual" != "$expected" ]; then
  echo "unexpected Rust DLL exports:"
  printf '%s\n' "$exports"
  exit 1
fi

for bad in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
  if x86_64-w64-mingw32-objdump -p "$rust_artifact" | grep -qi "DLL Name: $bad"; then
    echo "Rust DLL has unshipped runtime import: $bad"
    exit 1
  fi
done
'''

[tasks.compare]
description = "Compare C++ and Rust DLL ABI results under Wine"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-cpp
mise run build-rust
mise run build-harness

cpp_dll="$TARGET_DIR/cpp/$DLL"
rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"

wine "$harness" compare \
  --cpp "$(winepath -w "$(readlink -f "$cpp_dll")")" \
  --rust "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --threads 1
'''

[tasks.bench]
description = "Benchmark the Rust DLL under Wine"
run = "mise run bench-rust"

[tasks.bench-rust]
description = "Benchmark the Rust DLL under Wine"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-rust
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-1}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"
wine "$harness" bench \
  --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-cpp]
description = "Benchmark the C++ oracle DLL under Wine"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-cpp
mise run build-harness

cpp_dll="$TARGET_DIR/cpp/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-1}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"
wine "$harness" bench \
  --dll "$(winepath -w "$(readlink -f "$cpp_dll")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-compare]
description = "Benchmark C++ vs Rust"
shell = "bash -c"
run = '''
set -euo pipefail
mise run build-cpp
mise run build-rust
mise run build-harness

cpp_dll="$TARGET_DIR/cpp/$DLL"
rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$RUST_DIR/target/$rust_target/release/immolate_dll_harness.exe"
bench_case="${BENCH_CASE:-all}"
bench_budget="${BENCH_BUDGET:-1000000}"
bench_threads="${BENCH_THREADS:-1}"
bench_repeat="${BENCH_REPEAT:-5}"
bench_warmup="${BENCH_WARMUP:-1}"
bench_min_ratio="${BENCH_MIN_RATIO:-1.0}"
bench_format="${BENCH_FORMAT:-pretty}"
bench_color="${BENCH_COLOR:-auto}"

wine "$harness" bench-compare \
  --cpp "$(winepath -w "$(readlink -f "$cpp_dll")")" \
  --rust "$(winepath -w "$(readlink -f "$rust_artifact")")" \
  --case "$bench_case" \
  --budget "$bench_budget" \
  --threads "$bench_threads" \
  --repeat "$bench_repeat" \
  --warmup "$bench_warmup" \
  --min-ratio "$bench_min_ratio" \
  --format "$bench_format" \
  --color "$bench_color"
'''

[tasks.bench-full]
description = "Strict full-suite C++ vs Rust benchmark gate"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=1 \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.bench-ux]
description = "Strict actual Lua UI UX benchmark gate"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=ux \
BENCH_BUDGET=100000 \
BENCH_REPEAT=5 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_FORMAT=tsv \
BENCH_COLOR=never \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.bench-pretty]
description = "Full-suite pretty benchmark dashboard"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=1000000 \
BENCH_REPEAT=7 \
BENCH_WARMUP=2 \
BENCH_THREADS=1 \
BENCH_FORMAT=pretty \
BENCH_COLOR=always \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.check-rust]
description = "Run Rust format, clippy, tests, DLL validation, compare, and benchmark smoke"
shell = "bash -c"
run = '''
set -euo pipefail
mise run fmt-rust-check
mise run clippy-rust
mise run test-rust
mise run check-rust-dll
mise run compare
BENCH_BUDGET=1000 BENCH_REPEAT=1 BENCH_CASE=pack-miss BENCH_MIN_RATIO=1.0 mise run bench-compare
'''

[tasks.check]
description = "Run Lua/C++/Rust lint plus the Rust DLL validation gate"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint
mise run check-rust
'''

[tasks.format]
description = "Format Lua, C++, and Rust where tools are available"
shell = "bash -c"
run = '''
set -euo pipefail
if command -v stylua >/dev/null; then
  stylua Brainstorm.lua UI.lua config.lua steamodded_compat.lua
else
  echo "stylua not found"
fi

if command -v clang-format >/dev/null; then
  clang-format -i "$CPP_DIR"/*.cpp "$CPP_DIR"/*.hpp
else
  echo "clang-format not found"
fi

cargo fmt --manifest-path "$RUST_DIR/Cargo.toml"
'''

[tasks.fmt]
description = "Alias for format"
run = "mise run format"

[tasks.lint]
description = "Check Lua, C++, and Rust formatting/lints"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
lua_files=(Brainstorm.lua UI.lua config.lua steamodded_compat.lua nativefs.lua)

command -v stylua >/dev/null || { echo "stylua not found. Run: mise install"; exit 1; }
command -v luajit >/dev/null || { echo "luajit not found. Install LuaJIT, then run: mise run doctor"; exit 1; }
command -v luacheck >/dev/null || { echo "luacheck not found. Run: mise run setup-lua"; exit 1; }
command -v clang-format >/dev/null || { echo "clang-format not found. Install clang-format, then run: mise run doctor"; exit 1; }

stylua --check Brainstorm.lua UI.lua config.lua steamodded_compat.lua
for lua_file in "${lua_files[@]}"; do
  luajit -b "$lua_file" "/tmp/brainstorm-${lua_file//\//-}.luajit"
done
luacheck Brainstorm.lua UI.lua config.lua steamodded_compat.lua
clang-format --dry-run -Werror "$CPP_DIR"/*.cpp "$CPP_DIR"/*.hpp

cargo fmt --manifest-path "$RUST_DIR/Cargo.toml" --check
cargo clippy --manifest-path "$RUST_DIR/Cargo.toml" --all-targets -- -D warnings
'''

[tasks.release]
description = "Build, validate, and package release zip"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check

rm -rf release
mkdir -p "$RELEASE_DIR"
cp Brainstorm.lua UI.lua config.lua lovely.toml nativefs.lua steamodded_compat.lua "$RELEASE_DIR"/
cp "$DLL" "$RELEASE_DIR"/
echo "3.1" > "$RELEASE_DIR/VERSION"
date >> "$RELEASE_DIR/VERSION"
if command -v zip >/dev/null; then
  (cd release && zip -r Brainstorm_v3.1.zip Brainstorm_v3.1 >/dev/null)
else
  echo "zip not found"
fi
'''

[tasks.deploy]
description = "Build, validate, and copy the mod to TARGET"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check-rust
target="${TARGET:-/mnt/c/Users/Krish/AppData/Roaming/Balatro/Mods/Brainstorm}"

echo "Deploying to $target"
mkdir -p "$target"
rm -rf "$target/Core" "$target/UI"
cp Brainstorm.lua UI.lua config.lua lovely.toml nativefs.lua steamodded_compat.lua "$target"/
cp "$DLL" "$target/$DLL"
'''

[tasks.clean]
description = "Remove build and release artifacts"
run = "rm -rf Immolate/build Immolate.dll release target/cpp target/rust"
